<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tugas Form Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
          <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 mb-2">Form Pendaftaran Mahasiswa</h1>
              <p class="text-secondary mb-4">Lengkapi data berikut dengan benar.</p>

              <form id="registrationForm" class="needs-validation" novalidate>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" id="namaLengkap" required minlength="3" />
                    <div class="invalid-feedback">Nama minimal 3 karakter.</div>
                  </div>

                  <div class="col-md-6">
                    <label for="nim" class="form-label">NIM</label>
                    <input type="text" class="form-control" id="nim" required pattern="[0-9]{8,12}" />
                    <div class="invalid-feedback">NIM harus 8-12 digit angka.</div>
                  </div>

                  <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required />
                    <div class="invalid-feedback">Masukkan email yang valid.</div>
                  </div>

                  <div class="col-md-6">
                    <label for="telepon" class="form-label">No. Telepon</label>
                    <input type="tel" class="form-control" id="telepon" required pattern="[0-9]{10,15}" />
                    <div class="invalid-feedback">Nomor telepon harus 10-15 digit angka.</div>
                  </div>

                  <div class="col-md-6">
                    <label for="tanggalLahir" class="form-label">Tanggal Lahir</label>
                    <input type="date" class="form-control" id="tanggalLahir" required />
                    <div class="invalid-feedback">Tanggal lahir wajib diisi.</div>
                  </div>

                  <div class="col-md-6">
                    <label for="jurusan" class="form-label">Jurusan</label>
                    <select class="form-select" id="jurusan" required>
                      <option value="" selected disabled>Pilih jurusan</option>
                      <option>Teknik Informatika</option>
                      <option>Sistem Informasi</option>
                      <option>Manajemen Informatika</option>
                      <option>Teknik Komputer</option>
                    </select>
                    <div class="invalid-feedback">Jurusan wajib dipilih.</div>
                  </div>

                  <div class="col-12">
                    <label for="alamat" class="form-label">Alamat</label>
                    <textarea class="form-control" id="alamat" rows="3" required></textarea>
                    <div class="invalid-feedback">Alamat wajib diisi.</div>
                  </div>

                  <div class="col-12">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="setuju" required />
                      <label class="form-check-label" for="setuju">Saya menyetujui data di atas adalah benar.</label>
                      <div class="invalid-feedback">Anda harus menyetujui pernyataan ini.</div>
                    </div>
                  </div>

                  <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary px-4">Kirim</button>
                    <button type="reset" class="btn btn-outline-secondary px-4">Reset</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');
      Array.from(forms).forEach((form) => {
        form.addEventListener('submit', (event) => {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          }
          form.classList.add('was-validated');
        });
      });
    })();
  </script>
</body>
</html>
